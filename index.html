<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nichapa | Portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 { font-size: 3rem; margin: 0; color: var(--accent-color); }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--accent-color);
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Nichapa</h1>
        <p>Creative Designer & Developer</p>
    </section>

    <div class="container">
        <section>
            <h2>ผลงานที่ผ่านมา</h2>
            <div class="grid">
                <div class="card">
                    <h3>Project Name 1</h3>
                    <p>รายละเอียดโปรเจกต์สั้นๆ ที่อธิบายความสามารถและสิ่งที่คุณทำ</p>
                    <a href="#" class="btn">ดูรายละเอียด</a>
                </div>
                <div class="card">
                    <h3>Project Name 2</h3>
                    <p>รายละเอียดโปรเจกต์ที่สอง เน้นผลลัพธ์ที่ได้รับจากการทำงาน</p>
                    <a href="#" class="btn">ดูรายละเอียด</a>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
